version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{ .Version }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # Do NOT set `prerelease: auto`. Empirically, the Terraform Registry
  # refuses to index GitHub releases whose `prerelease` flag is true,
  # even when the version itself carries a SemVer prerelease suffix
  # (-beta.N, -rc.N). Terraform's constraint solver already treats
  # such suffixes as opt-in only on the consumer side, so the GitHub
  # flag is redundant guardrail. Leaving it `false` (goreleaser
  # default) keeps Registry ingestion working; the 0.2.0-beta.* tags
  # used this pattern.
  #
  # If we ever ship a final stable v1.0.0, the convention is the same:
  # tags without a SemVer suffix become GitHub-Latest automatically,
  # tags with a suffix do not.
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

changelog:
  disable: true
